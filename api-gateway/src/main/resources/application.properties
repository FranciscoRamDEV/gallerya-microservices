# =============================================
# CONFIGURACIÓN DEL API GATEWAY - GALLERYA
# =============================================

# Nombre del servicio
spring.application.name=api-gateway

# Puerto del gateway (punto de entrada único de Gallerya)
server.port=8080

# ¿Dónde está Eureka? El Gateway se registra ahí
# para poder descubrir los demás microservicios
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Permite que el Gateway use el nombre del servicio
# registrado en Eureka para enrutar (ej: lb://auth-service)
spring.cloud.gateway.discovery.locator.enabled=true

# Los nombres de los servicios en las rutas serán
# en minúsculas (ej: /auth-service/ en vez de /AUTH-SERVICE/)
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ===== RUTAS DEL GATEWAY =====
# Cada ruta le dice al Gateway: "si la URL empieza con X,
# redirige al microservicio Y"

# Ruta hacia auth-service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# Ruta hacia user-service
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

# Ruta hacia category-service
spring.cloud.gateway.routes[2].id=category-service
spring.cloud.gateway.routes[2].uri=lb://category-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/categories/**

# Ruta hacia product-service
spring.cloud.gateway.routes[3].id=product-service
spring.cloud.gateway.routes[3].uri=lb://product-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/products/**

# Ruta hacia inventory-service
spring.cloud.gateway.routes[4].id=inventory-service
spring.cloud.gateway.routes[4].uri=lb://inventory-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/inventory/**

# Ruta hacia cart-service
spring.cloud.gateway.routes[5].id=cart-service
spring.cloud.gateway.routes[5].uri=lb://cart-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/cart/**

# Ruta hacia order-service
spring.cloud.gateway.routes[6].id=order-service
spring.cloud.gateway.routes[6].uri=lb://order-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/orders/**

# Ruta hacia payment-service
spring.cloud.gateway.routes[7].id=payment-service
spring.cloud.gateway.routes[7].uri=lb://payment-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/payments/**

# Ruta hacia shipping-service
spring.cloud.gateway.routes[8].id=shipping-service
spring.cloud.gateway.routes[8].uri=lb://shipping-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/shipping/**

# Ruta hacia notification-service
spring.cloud.gateway.routes[9].id=notification-service
spring.cloud.gateway.routes[9].uri=lb://notification-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/notifications/**

# Logs para ver qué rutas está usando el Gateway (para debugging)
logging.level.org.springframework.cloud.gateway=INFO