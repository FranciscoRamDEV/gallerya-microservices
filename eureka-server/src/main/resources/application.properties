# =============================================
# CONFIGURACIÓN DEL EUREKA SERVER - GALLERYA
# =============================================

# Nombre del servicio
spring.application.name=eureka-server

# Puerto donde correra Eureka
server.port=8761

# Eureka es el directorio, no necesita registrarse en sí mismo
eureka.client.register-with-eureka=false

# En desarrollo trabajamos con un solo servidor
eureka.client.fetch-registry=false

# URL donde Eureka escucha a los microservicios que quieran registrarse
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Nombre que aparece en el panel visual de Eureka
eureka.instance.hostname=localhost